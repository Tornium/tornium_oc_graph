name: Build

on:
  pull_request:
  workflow_dispatch:
  # push:
  #   branches:
  #     - master
  release:
    types:
      - published

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # macos-15-intel is an Intel runner, macos-14 is Apple silicon
        # os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-15-intel, macos-14]
        os: [ubuntu-latest, ubuntu-24.04-arm]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache wheels
        id: cache-wheels
        uses: actions/cache@v4
        with:
          path: ./wheelhouse
          key: ${{ runner.os }}-wheels-${{ hashFiles('pyproject.toml', 'c_src/**', 'python_src/**') }}

      - name: Build wheels
        if: steps.cache-wheels.outputs.cache-hit != 'true'
        uses: pypa/cibuildwheel@v3.4.1
        # env:
        #   CIBW_SOME_OPTION: value
        #   ...
        # with:
        #   package-dir: .
        #   output-dir: wheelhouse
        #   config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v4
        # if: github.event_name == 'pull_request'
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # if: github.event_name == 'release' && github.event.action == 'published'
    # or, alternatively, upload to PyPI on every tag starting with 'v' (remove on: release above to use this)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v5
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        # To test uploads to TestPyPI, uncomment the following:
        with:
          # repository-url: https://test.pypi.org/legacy/
          repository-url: ${{ github.event_name == 'workflow_dispatch'
                && 'https://test.pypi.org/legacy/'
                || 'https://upload.pypi.org/legacy/' }}
